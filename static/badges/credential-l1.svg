<svg xmlns="http://www.w3.org/2000/svg" width="240" height="48" viewBox="0 0 240 48">
  <defs>
    <linearGradient id="cred-grad-r1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="cred-grad-l1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="cred-shadow1" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <clipPath id="cred-clip1">
      <rect width="240" height="48" rx="8"/>
    </clipPath>
  </defs>
  <g filter="url(#cred-shadow1)">
    <g clip-path="url(#cred-clip1)">
      <!-- Left dark section -->
      <rect width="74" height="48" fill="#1a1a2e"/>
      <rect width="74" height="48" fill="url(#cred-grad-l1)"/>
      <!-- SF Monogram -->
    <g transform="translate(36,24)">
      <!-- Geometric SF mark: interlocking letterforms -->
      <path d="M-14,-12 L-2,-12 C0,-12 1,-11 1,-9 L1,-3 L-7,-3 C-9,-3 -10,-4 -10,-6 L-10,-9 C-10,-11 -9,-12 -7,-12" fill="none" stroke="white" stroke-width="1.6" opacity="0.95"/>
      <path d="M-14,3 L-2,3 C0,3 1,2 1,0 L1,-3" fill="none" stroke="white" stroke-width="1.6" opacity="0.95"/>
      <path d="M-14,3 C-14,5 -13,6 -11,6 L1,6 C3,6 4,5 4,3" fill="none" stroke="white" stroke-width="1.6" opacity="0.95"/>
      <path d="M-14,-12 C-14,-10 -14,-9 -14,-6" fill="none" stroke="white" stroke-width="1.6" opacity="0.95"/>
      <!-- F letterform offset -->
      <path d="M3,-12 L3,12" fill="none" stroke="white" stroke-width="1.6" opacity="0.7"/>
      <path d="M3,-12 L15,-12" fill="none" stroke="white" stroke-width="1.6" opacity="0.7"/>
      <path d="M3,-1 L12,-1" fill="none" stroke="white" stroke-width="1.6" opacity="0.7"/>
    </g>
      <!-- Right colored section -->
      <rect x="74" width="166" height="48" fill="#6B7280"/>
      <rect x="74" width="166" height="48" fill="url(#cred-grad-r1)"/>
      <!-- Subtle separator -->
      <rect x="73" y="6" width="1" height="36" fill="#ffffff" opacity="0.12" rx="0.5"/>
      <!-- Top text: Silicon Friendly -->
      <text x="157" y="22" text-anchor="middle" fill="white" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="600" letter-spacing="0.4">Silicon Friendly</text>
      <!-- Bottom text: Level n - Name -->
      <text x="157" y="36" text-anchor="middle" fill="white" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="500" opacity="0.90" letter-spacing="0.3">Level 1 · Basic</text>
    </g>
  </g>
  <!-- Outer highlight -->
  <rect width="240" height="48" rx="8" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5"/>
</svg>