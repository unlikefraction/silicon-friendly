<svg xmlns="http://www.w3.org/2000/svg" width="160" height="32" viewBox="0 0 160 32">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
  </defs>
  <rect width="160" height="32" rx="6" fill="#1a1a2e"/>
  <rect x="40" width="120" height="32" rx="0" fill="#059669"/>
  <rect x="40" y="0" width="6" height="32" fill="#1a1a2e"/>
  <rect width="160" height="32" rx="6" fill="none"/>
  <!-- Clip to rounded rect -->
  <clipPath id="clip">
    <rect width="160" height="32" rx="6"/>
  </clipPath>
  <g clip-path="url(#clip)">
    <rect width="46" height="32" fill="#1a1a2e"/>
    <rect x="46" width="114" height="32" fill="#059669"/>
    <text x="23" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="600">SF</text>
    <text x="103" y="21" text-anchor="middle" fill="white" font-size="11" font-weight="600">Silicon Friendly L4</text>
  </g>
</svg>