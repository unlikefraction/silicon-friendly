<svg xmlns="http://www.w3.org/2000/svg" width="200" height="44" viewBox="0 0 200 44">
  <defs>
    <linearGradient id="sh-grad-l2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="sh-grad-r2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="sh-shadow2" x="-3%" y="-3%" width="106%" height="114%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <clipPath id="sh-clip2">
      <rect width="200" height="44" rx="6"/>
    </clipPath>
  </defs>
  <g filter="url(#sh-shadow2)">
    <g clip-path="url(#sh-clip2)">
      <!-- Left section -->
      <rect width="90" height="44" fill="#1a1a2e"/>
      <rect width="90" height="44" fill="url(#sh-grad-l2)"/>
      <!-- Shield icon -->
      <g transform="translate(18, 10)">
        <path d="M12,0 L22,5 L22,14 C22,20 18,23 12,25 C6,23 2,20 2,14 L2,5 Z" fill="none" stroke="white" stroke-width="1.4" opacity="0.8"/>
        <path d="M12,4 L19,7.5 L19,14 C19,18.5 16,21 12,22.5 C8,21 5,18.5 5,14 L5,7.5 Z" fill="white" opacity="0.1"/>
        <!-- Checkmark inside shield -->
        <path d="M8,13 L11,16 L17,10" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
      </g>
      <!-- Left text -->
      <text x="56" y="20" fill="white" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600" letter-spacing="1.2" opacity="0.85">SILICON</text>
      <text x="56" y="33" fill="white" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="8" font-weight="500" letter-spacing="0.5" opacity="0.6">CERTIFIED</text>
      <!-- Separator -->
      <rect x="89" y="5" width="1.5" height="34" fill="#ffffff" opacity="0.08" rx="0.75"/>
      <!-- Right section -->
      <rect x="90" width="110" height="44" fill="#2563EB"/>
      <rect x="90" width="110" height="44" fill="url(#sh-grad-r2)"/>
      <!-- Right text -->
      <text x="145" y="20" text-anchor="middle" fill="white" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5">FRIENDLY</text>
      <text x="145" y="33" text-anchor="middle" fill="white" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="500" letter-spacing="0.8" opacity="0.9">LEVEL 2</text>
    </g>
  </g>
  <!-- Outer border -->
  <rect width="200" height="44" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5"/>
</svg>